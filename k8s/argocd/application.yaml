apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ecommerce-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Sachinn-9700/gitops-eks-github-actions-argocd.git
    targetRevision: HEAD
    path: k8s/argocd

  destination:
    server: https://kubernetes.default.svc
    namespace: ecommerce

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true  