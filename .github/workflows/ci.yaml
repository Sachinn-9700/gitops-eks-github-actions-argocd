name: CI Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

jobs:
  # 🔹 JOB 1: Build & Push Docker Images
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Generate tag using commit SHA
      - name: Set image tag
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # Build & Push Backend
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./app/backend
          file: ./app/backend/Dockerfile
          push: true
          tags: ${{ env.DOCKER_USERNAME }}/ecommerce-backend:${{ env.TAG }}

      # Build & Push Frontend
      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./app/frontend
          file: ./app/frontend/Dockerfile
          push: true
          tags: ${{ env.DOCKER_USERNAME }}/ecommerce-frontend:${{ env.TAG }}

  # 🔹 JOB 2: Update Kubernetes Manifests (GitOps Step)
  update-k8s-manifests:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      # Checkout repo with write access
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Update backend image
      - name: Update backend image tag
        run: |
          sed -i "s|image: .*ecommerce-backend.*|image: $DOCKER_USERNAME/ecommerce-backend:${{ env.TAG }}|" k8s/backend/deployment.yaml

      # Update frontend image
      - name: Update frontend image tag
        run: |
          sed -i "s|image: .*ecommerce-frontend.*|image: $DOCKER_USERNAME/ecommerce-frontend:${{ env.TAG }}|" k8s/frontend/deployment.yaml

      # Commit and push changes
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add .
          git commit -m "ci: update image tags to ${{ env.TAG }}" || echo "No changes to commit"
          git push