name: CI Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

jobs:
  # JOB 1: Build & Push Docker Images
  build-and-push:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.set_tag.outputs.TAG }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

    
      - name: Set image tag
        id: set_tag
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./app/backend
          file: ./app/backend/Dockerfile
          push: true
          tags: ${{ env.DOCKER_USERNAME }}/ecommerce-backend:${{ steps.set_tag.outputs.TAG }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./app/frontend
          file: ./app/frontend/Dockerfile
          push: true
          tags: ${{ env.DOCKER_USERNAME }}/ecommerce-frontend:${{ steps.set_tag.outputs.TAG }}

  # 🔹 JOB 2: Update Kubernetes Manifests (GitOps)
  update-k8s-manifests:
    runs-on: ubuntu-latest
    needs: build-and-push

    # PREVENT INFINITE LOOP
    if: "!contains(github.event.head_commit.message, 'ci: update image tags')"

    env:
      TAG: ${{ needs.build-and-push.outputs.image_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update backend image tag
        run: |
          sed -i "s|image: .*ecommerce-backend:.*|image: $DOCKER_USERNAME/ecommerce-backend:$TAG|" k8s/backend/deployment.yaml

      - name: Update frontend image tag
        run: |
          sed -i "s|image: .*ecommerce-frontend:.*|image: $DOCKER_USERNAME/ecommerce-frontend:$TAG|" k8s/frontend/deployment.yaml

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add .
          git commit -m "ci: update image tags to $TAG" || echo "No changes to commit"
          git push
