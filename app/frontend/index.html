<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>🛒 Sachin GitOps Test</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: #f4f6f9;
}

/* NAVBAR */
nav {
  background: #0a2540;
  color: white;
  padding: 16px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

nav ul {
  display: flex;
  gap: 20px;
  list-style: none;
}

nav a {
  color: white;
  text-decoration: none;
}

/* HERO */
.hero {
  background: linear-gradient(to right, #0a2540, #1f4e8c);
  color: white;
  text-align: center;
  padding: 60px 20px;
}

.hero h2 {
  font-size: 34px;
}

/* MAIN */
main {
  padding: 30px;
}

/* STATUS */
.status {
  margin-bottom: 20px;
  font-weight: bold;
}

/* PRODUCTS */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
  gap: 20px;
}

.product {
  background: white;
  border-radius: 10px;
  padding: 15px;
  transition: 0.3s;
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

.product:hover {
  transform: translateY(-5px);
}

.product img {
  width: 100%;
  height: 160px;
  object-fit: cover;
  border-radius: 6px;
}

.product h3 {
  margin: 10px 0 5px;
}

.product p {
  font-size: 14px;
  color: #666;
}

.product strong {
  display: block;
  margin-top: 8px;
  font-size: 18px;
}

.product button {
  margin-top: 10px;
  width: 100%;
  padding: 10px;
  border: none;
  background: #0a2540;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}

.product button:hover {
  background: #1f4e8c;
}

/* CART */
.cart {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #0a2540;
  color: white;
  padding: 12px 18px;
  border-radius: 25px;
  cursor: pointer;
}

/* FOOTER */
footer {
  margin-top: 40px;
  padding: 20px;
  text-align: center;
  color: #777;
}
</style>
</head>

<body>

<nav>
  <h1>🛒 AutoScale Shop</h1>
  <ul>
    <li><a href="#">Home</a></li>
    <li><a href="#">Products</a></li>
  </ul>
</nav>

<section class="hero">
  <h2>Cloud-Native E-Commerce Platform</h2>
  <p>Kubernetes • GitOps • Auto Scaling • CI/CD</p>
</section>

<main>
  <div class="status" id="backend-status">⏳ Connecting...</div>
  <div class="products" id="product-list"></div>
</main>

<div class="cart" onclick="viewCart()">
  Cart (<span id="cart-count">0</span>)
</div>

<footer>
  Built with Kubernetes • Terraform • ArgoCD • GitHub Actions
</footer>

<script>
const API_BASE = "http://192.168.49.2:32683/"; // Minikube NodePort
let cartCount = 0;

async function loadProducts() {
  try {
    const res = await fetch(`${API_BASE}/api/products`);

    if (!res.ok) throw new Error();

    const products = await res.json();
    const container = document.getElementById("product-list");
    container.innerHTML = "";

    products.forEach(p => {
      const div = document.createElement("div");
      div.className = "product";

      div.innerHTML = `
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <p>${p.description}</p>
        <strong>₹${p.price}</strong>
        <button onclick="addToCart('${p.id}')">Add to Cart</button>
      `;

      container.appendChild(div);
    });

    updateStatus("🟢 Backend Connected", "green");

  } catch {
    updateStatus("🔴 Backend Unreachable", "red");
  }
}

async function addToCart(id) {
  try {
    await fetch(`${API_BASE}/api/cart`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ product_id: id })
    });

    cartCount++;
    document.getElementById("cart-count").innerText = cartCount;

  } catch {
    alert("Failed to add to cart");
  }
}

function updateStatus(msg, color) {
  const el = document.getElementById("backend-status");
  el.innerText = msg;
  el.style.color = color;
}

function viewCart() {
  alert("Cart handled by backend 🚀");
}

loadProducts();
</script>

</body>
</html>
